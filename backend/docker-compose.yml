services:
  postgres:
    image: postgres:15-alpine
    container_name: animus_postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: Eva01
      POSTGRES_DB: animus_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_animus:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d animus_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data_animus:
